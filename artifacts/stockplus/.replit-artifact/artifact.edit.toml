kind = "web"
previewPath = "/"
title = "StockPlus"
version = "1.0.0"
id = "artifacts/stockplus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22133

[services.development]
run = "pnpm --filter @workspace/stockplus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stockplus", "run", "build" ]
publicDir = "artifacts/stockplus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22133"
BASE_PATH = "/"
