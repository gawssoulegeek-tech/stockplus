# Configuration optimisée pour Senestock AI
# Note : Le déploiement via App Hosting nécessite l'activation du plan Blaze (Google Cloud).

runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 40
  cpu: 1
  memoryMiB: 512

env:
  - name: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
  - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
  - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ""
  - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
  - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
  - name: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
  - name: GEMINI_API_KEY
    value: ""
